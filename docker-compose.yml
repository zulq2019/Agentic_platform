      POSTGRES_DSN: postgresql://aep:aep@postgres:5432/aep
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      ENVIRONMENT: dev
