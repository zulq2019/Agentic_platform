[pytest]
pythonpath = src/tests
testpaths =
    src/tests
    src/shared/aep_common/tests
asyncio_mode = auto
markers =
    story_us_01_01: Tests for User Story US-01.01 Service Bootstrap
    story_us_01_02: Tests for User Story US-01.02 Local Developer Environment
    story_us_01_03: Tests for User Story US-01.03 Event Bus Ready
    story_us_01_04: Tests for User Story US-01.04 Database Migrated
    story_us_01_05: Tests for User Story US-01.05 CI Feedback
    story_us_01_06: Tests for User Story US-01.06 Shared Logging
    story_us_01_07: Tests for User Story US-01.07 Observability Baseline
    integration: Integration tests requiring docker compose stack
    e2e: End-to-end tests requiring make dev-up environment
