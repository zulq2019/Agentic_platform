name: CI

on:
  push:
    branches: [main, master, develop, "feature/**"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black pytest pytest-asyncio httpx pytest-cov
          pip install -r requirements-dev.txt
          pip install -e "src/shared/aep_common[health]"
          pip install "fastapi>=0.110.0" "uvicorn[standard]>=0.27.0"

      - name: Ruff
        run: ruff check src/shared/aep_common src/platform src/tests migrations scripts/run_migrations.py

      - name: Black
        run: black --check src/shared/aep_common src/platform src/tests migrations scripts/run_migrations.py

      - name: Unit tests (US-01.01)
        run: |
          python scripts/run_tests.py
          python -m pytest src/tests -m "story_us_01_01 and not integration and not e2e" -v --cov=aep_common.app --cov=aep_common.dependencies --cov=aep_common.health --cov=aep_common.logging --cov=aep_common.metrics --cov-report=term-missing --cov-fail-under=80

      - name: Unit tests (US-01.04)
        run: python -m pytest src/tests -m "story_us_01_04 and not integration" -v --cov=aep_common.db --cov-report=term-missing --cov-fail-under=80

  database-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aep
          POSTGRES_PASSWORD: ci-test-password
          POSTGRES_DB: aep
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aep -d aep"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_DSN: postgresql://aep:ci-test-password@localhost:5432/aep
      AEP_APP_DB_PASSWORD: ci-app-password
      AEP_APP_POSTGRES_DSN: postgresql://aep_app:ci-app-password@localhost:5432/aep
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          pip install -r requirements-dev.txt
          pip install -e "src/shared/aep_common[health]"

      - name: Integration tests (US-01.04 AC-01.03)
        run: python -m pytest src/tests -m "story_us_01_04 and integration" -v
