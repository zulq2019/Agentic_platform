name: CI

on:
  push:
    branches: [main, master, develop, "feature/**"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black pytest pytest-asyncio httpx pytest-cov
          pip install -r requirements-dev.txt
          pip install -e "src/shared/aep_common[health]"
          pip install "fastapi>=0.110.0" "uvicorn[standard]>=0.27.0"

      - name: Ruff
        run: ruff check src/shared/aep_common src/platform src/tests

      - name: Black
        run: black --check src/shared/aep_common src/platform src/tests

      - name: Unit tests (US-01.01)
        run: |
          python scripts/run_tests.py
          python -m pytest src/tests -m "story_us_01_01 and not integration and not e2e" -v --cov=aep_common.app --cov=aep_common.dependencies --cov=aep_common.health --cov=aep_common.logging --cov=aep_common.metrics --cov-report=term-missing --cov-fail-under=80

      - name: Unit tests (US-01.04)
        run: |
          python -m pytest src/tests -m "story_us_01_04 and not integration" -v --cov=aep_common.db --cov-report=term-missing --cov-fail-under=80
